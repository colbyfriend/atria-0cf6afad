<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atria Analytics</title>
<meta name="description" content="Facebook / Meta ad analytics dashboard">
<!-- PWA / installable app -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f0682a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Atria">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Chart.js bundled locally so the app works offline / under the service worker -->
<script src="chart.umd.js"></script>
<style>
:root{
  color-scheme: light;
  --bg:#f5f6f8; --card:#ffffff; --ink:#1c2024; --muted:#6b7280; --line:#e7e9ee;
  --accent:#f0682a; --accent-soft:#fdeee6;
  --green:#1a9d63; --green-bg:#e7f6ee; --amber:#c9870a; --amber-bg:#fdf3e0; --red:#d6452f; --red-bg:#fdecea;
  --blue:#3563d6; --purple:#7c6cf0;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.45}
a{color:var(--blue);text-decoration:none}
h1,h2,h3{margin:0;font-weight:650}
.wrap{max-width:1180px;margin:0 auto;padding:16px 18px 70px}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.brand .dot{width:22px;height:22px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.acct{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
.spacer{flex:1}
.ctrl{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
select,.btn{font-family:inherit;font-size:12px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:6px 10px;cursor:pointer}
.btn:hover{background:#fafafa}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(.96)}
.btn.ghost{background:transparent}
#campSel{font-weight:600;color:var(--ink);border-color:#d9dce3}
.dateinput{font-family:inherit;font-size:12px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:5px 8px}
#customRange{gap:6px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
.seg button{border:0;background:#fff;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--muted)}
.seg button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.section{margin-top:18px}
.section-head{display:flex;align-items:center;gap:10px;margin:0 2px 11px}
.section-head h2{font-size:14px}
.section-head .sub{font-size:11.5px;color:var(--muted)}
.section-head .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.grid-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(156px,1fr));gap:10px}
.tile{padding:11px 12px 9px;border-radius:12px;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;min-height:108px;position:relative}
.tile:not(.tile-add):not(.editing):hover{box-shadow:0 4px 12px rgba(16,24,40,.08)}
.grid-metrics.editing .tile{border-style:dashed;cursor:grab}
.grid-metrics.editing .tile:active{cursor:grabbing}
.tile.dragging{opacity:.45}
.tile.over{outline:2px dashed var(--accent);outline-offset:2px}
.tile-x{position:absolute;top:5px;right:6px;width:18px;height:18px;border:1px solid var(--line);background:#fff;color:var(--red);border-radius:50%;line-height:1;font-size:13px;cursor:pointer;padding:0;z-index:3;display:flex;align-items:center;justify-content:center}
.tile-x:hover{background:var(--red-bg)}
.drag-h{margin-left:auto;color:var(--muted);font-size:13px}
.tile-add{border-style:dashed;background:#fafbfc;justify-content:flex-start}
.tile-add select{margin-top:6px;width:100%}
.km-hint{font-size:11.5px;margin:9px 2px 0}
.tile .lab{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;min-height:14px}
.tile .val{font-size:21px;font-weight:700;margin-top:4px;letter-spacing:-.02em;line-height:1.1}
.tile .delta{font-size:11px;font-weight:600;margin-top:2px;display:inline-flex;align-items:center;gap:3px;min-height:15px}
.tile .sparkwrap{margin-top:auto;height:30px;position:relative}
.tile .sparkwrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
.up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
.dot-status{width:7px;height:7px;border-radius:50%;display:inline-block}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.pill.g{background:var(--green-bg);color:var(--green)} .pill.a{background:var(--amber-bg);color:var(--amber)} .pill.r{background:var(--red-bg);color:var(--red)} .pill.n{background:#eef0f4;color:var(--muted)} .pill.b{background:#e9eefb;color:var(--blue)}
/* rolling box */
.rollwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0;padding:4px}
.rollcell{padding:11px 14px;border-right:1px solid var(--line)}
.rollcell:last-child{border-right:0}
.rollcell .k{font-size:11px;color:var(--muted)}
.rollcell .v{font-size:19px;font-weight:700;margin-top:3px}
.rollcell .sec{font-size:11px;color:var(--muted);margin-top:1px}
.chartwrap{position:relative;width:100%}
.chart-box{padding:12px}
.bk-wrap{padding:12px;display:grid;grid-template-columns:1.15fr .85fr;gap:14px;align-items:start}
.bk-table{font-size:12px;border-collapse:collapse;width:100%}
.bk-table th,.bk-table td{text-align:right;padding:5px 7px;border-bottom:1px solid var(--line)}
.bk-table th:first-child,.bk-table td:first-child{text-align:left}
.bk-table th{color:var(--muted);font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:12px}
.adcard{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .12s,transform .12s;display:flex;flex-direction:column}
.adcard:hover{box-shadow:0 6px 18px rgba(16,24,40,.10);transform:translateY(-1px)}
.adcard .thumb{height:96px;position:relative;display:flex;align-items:center;justify-content:center}
.adcard .thumb .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.88);display:flex;align-items:center;justify-content:center;color:#222;font-size:13px}
.adcard .thumb .cnt{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.6);color:#fff;font-size:10.5px;padding:2px 7px;border-radius:999px}
.adcard .thumb .rk{position:absolute;top:7px;left:7px;background:rgba(255,255,255,.92);color:#222;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px}
.adcard .body{padding:9px 10px 10px}
.adcard .nm{font-weight:650;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.chip{background:#f7f8fa;border:1px solid var(--line);border-radius:7px;padding:4px 6px}
.chip .k{font-size:9.5px;color:var(--muted)}
.chip .v{font-size:12.5px;font-weight:650}
.chip.g{background:var(--green-bg);border-color:#cdeedd} .chip.a{background:var(--amber-bg);border-color:#f3e3bf} .chip.r{background:var(--red-bg);border-color:#f4d3cc}
.cardfoot{display:flex;gap:6px;padding:0 10px 10px}
.cardfoot .mini{flex:1;text-align:center;font-size:11px;border:1px solid var(--line);border-radius:7px;padding:4px;background:#fff}
.cardfoot .mini:hover{background:#fafafa}
.cmp-check{position:absolute;left:7px;bottom:7px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.92);border-radius:6px;padding:2px 6px;font-size:10.5px;color:#222}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,20,30,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:24px;overflow:auto}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:min(960px,100%);box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.modal-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.modal-head h3{font-size:15px}
.modal-head .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:0;background:none}
.tabs{display:flex;gap:4px;padding:10px 16px 0;border-bottom:1px solid var(--line)}
.tabs button{border:0;background:none;padding:7px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:650}
.modal-body{padding:14px 16px 18px;max-height:72vh;overflow:auto}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.mcell{border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fff}
.mcell .k{font-size:10.5px;color:var(--muted)}
.mcell .v{font-size:15px;font-weight:680;margin-top:2px}
.grouphdr{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;margin:15px 2px 8px}
.subads{font-size:12px;margin-top:6px}
.subads .row{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.subads .row .nm{flex:1;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted)}
.settings-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.settings-row label{flex:1}
.settings-row input[type=number]{width:90px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:12px}
.checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:6px;margin-top:8px}
.checks label{display:flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 8px;cursor:pointer}
.muted{color:var(--muted)}
.loading{padding:60px 20px;text-align:center;color:var(--muted)}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{margin:14px 0;padding:12px 14px;border:1px solid #f4d3cc;background:var(--red-bg);color:#902a1a;border-radius:10px;font-size:12.5px}
.legend{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle}
.cmpbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 14px rgba(0,0,0,.06);padding:9px 16px;display:none;align-items:center;gap:10px;z-index:40}
.cmpbar.show{display:flex}
.cmpbar .names{flex:1;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:780px){.bk-wrap{grid-template-columns:1fr}}

/* ===== Freshness badge ===== */
.acct.upd{display:inline-flex;align-items:center;gap:6px}
.acct.upd::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex:none}
.acct.upd.stale::before{background:var(--amber)}
.acct.upd.old::before{background:var(--red)}

/* ===== Touch feedback (hover states are invisible on touch) ===== */
.btn:active,.seg button:active,.cardfoot .mini:active{background:#eef0f4}
.btn.primary:active{filter:brightness(.92)}
.adcard:active{box-shadow:0 6px 18px rgba(16,24,40,.10);transform:translateY(-1px)}
.tile:not(.tile-add):active{box-shadow:0 4px 12px rgba(16,24,40,.10)}
.btn:focus-visible,select:focus-visible,input:focus-visible,.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ===== Phone layout (<=600px) ===== */
@media(max-width:600px){
  body{font-size:14px}
  .wrap{max-width:100%;padding:12px max(12px,env(safe-area-inset-right)) calc(80px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}
  .topbar{gap:8px;margin-bottom:14px}
  .topbar .acct{font-size:11.5px;padding:5px 8px}
  .spacer{display:none}
  #campSel{order:5;flex:1 1 100%;min-width:0;min-height:44px}
  .ctrl{width:100%;gap:8px}
  .ctrl #rangeSel{flex:1 1 auto;min-width:0}
  select,.btn{padding:9px 12px;font-size:13px;min-height:44px}
  .section{margin-top:16px}
  .section-head{flex-wrap:wrap}
  .section-head .right{margin-left:0;width:100%;flex-wrap:wrap}
  .section-head .right select{flex:1 1 auto;min-width:0}
  /* grids */
  .grid-metrics{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px}
  .tile{min-height:100px}
  .tile .val{font-size:19px}
  .rollwrap{grid-template-columns:1fr 1fr;padding:0}
  .rollcell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .rollcell:nth-child(2n){border-right:0}
  .cards{grid-template-columns:1fr 1fr;gap:10px}
  .mgrid{grid-template-columns:1fr 1fr}
  .checks{grid-template-columns:1fr 1fr}
  /* breakdown stacks; table scrolls horizontally */
  .bk-wrap{grid-template-columns:1fr;gap:10px}
  #bkTableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .bk-table{font-size:11.5px;min-width:340px}
  /* charts sized for a phone screen (overrides inline heights) */
  .chartwrap{height:230px!important}
  /* modal goes full-screen */
  .overlay{padding:0;align-items:stretch}
  .modal{width:100%;border-radius:0;min-height:100vh}
  .modal-head{position:sticky;top:0;background:#fff;z-index:2}
  .modal-body{max-height:none}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tabs button{white-space:nowrap;flex:none}
  /* fixed compare bar clears the home-indicator */
  .cmpbar{padding-bottom:calc(9px + env(safe-area-inset-bottom))}
}
/* ===== Very narrow phones (<=380px) ===== */
@media(max-width:380px){
  .grid-metrics{grid-template-columns:1fr 1fr}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="dot">∞</span> Atria Analytics</div>
    <span class="acct" id="acctName">OT_gettallboy-CC</span>
    <span class="acct upd" id="updBadge" title="When this data was last refreshed">Loading…</span>
    <select id="campSel" title="Filter by campaign"><option value="all">All campaigns</option></select>
    <div class="spacer"></div>
    <div class="ctrl">
      <select id="rangeSel" title="Date range">
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="last_7d">Last 7 days</option>
        <option value="last_14d" selected>Last 14 days</option>
        <option value="last_30d">Last 30 days</option>
        <option value="last_90d">Last 90 days</option>
        <option value="this_month">This month</option>
        <option value="last_month">Last month</option>
        <option value="maximum">Maximum</option>
      </select>
      <button class="btn" id="cmpToggle" title="Compare to previous period">Δ vs prev: on</button>
      <button class="btn" id="settingsBtn">⚙ Settings</button>
    </div>
  </div>
  <div id="app"><div class="loading"><div class="spinner"></div>Loading live data from your Facebook ad account…</div></div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<div class="cmpbar" id="cmpbar">
  <strong style="font-size:12px">Compare</strong>
  <span class="names" id="cmpNames"></span>
  <button class="btn" id="cmpOpen">Open comparison</button>
  <button class="btn ghost" id="cmpClear">Clear</button>
</div>

<script>
"use strict";
/* ============================ CONFIG ============================ */
const ACCT_ID="1675016859991849";
const ACCT_NAME="OT_gettallboy-CC";
const TOOL="mcp__ea0e2fa9-b8ef-4daf-a827-49ed508e3976__ads_get_ad_entities";
const FB_ADS_URL=id=>`https://www.facebook.com/adsmanager/manage/ads?act=${ACCT_ID}&selected_ad_ids=${id}`;

const AD_FIELDS=["id","name","campaign_id","amount_spent","impressions","reach","frequency","cpm","cpc","ctr","clicks",
  "purchase_roas","actions:omni_purchase","actions:link_click",
  "video_p25_watched_actions","video_p50_watched_actions","video_p75_watched_actions",
  "video_p95_watched_actions","video_p100_watched_actions","video_thruplay_watched_actions","creative_id"];
const AD_FIELDS_LITE=["id","name","campaign_id","amount_spent","impressions","reach","clicks","purchase_roas","actions:omni_purchase","actions:link_click"];
const ACCT_FIELDS=["amount_spent","impressions","reach","frequency","cpm","cpc","ctr","clicks","purchase_roas","actions:omni_purchase","actions:link_click"];
const CAMP_FIELDS=["id","name"].concat(ACCT_FIELDS);
const DAILY_FIELDS=["id","name","amount_spent","impressions","clicks","reach","purchase_roas","actions:omni_purchase"];

const METRICS={
  spend:{label:"Spend",fmt:"money",dir:"neutral"},
  purchases:{label:"Purchases",fmt:"int",dir:"up"},
  pv:{label:"Purchase Value",fmt:"money",dir:"up"},
  roas:{label:"ROAS",fmt:"x",dir:"up",tgt:"roas"},
  cpa:{label:"CPA",fmt:"money",dir:"down",tgt:"cpa"},
  aov:{label:"AOV",fmt:"money",dir:"up"},
  cpc:{label:"CPC",fmt:"money",dir:"down",tgt:"cpc"},
  cpm:{label:"CPM",fmt:"money",dir:"down",tgt:"cpm"},
  ctr:{label:"CTR",fmt:"pct",dir:"up",tgt:"ctr"},
  clicks:{label:"Clicks",fmt:"int",dir:"up"},
  linkClicks:{label:"Link Clicks",fmt:"int",dir:"up"},
  impressions:{label:"Impressions",fmt:"int",dir:"neutral"},
  reach:{label:"Reach",fmt:"int",dir:"neutral"},
  frequency:{label:"Frequency",fmt:"num2",dir:"down",tgt:"frequency"},
  hookRate:{label:"25% View Rate",fmt:"pct",dir:"up"},
  holdRate:{label:"Hold Rate",fmt:"pct",dir:"up"},
  cvr:{label:"Click→Purchase",fmt:"pct",dir:"up"}
};
const DEFAULTS={
  targets:{cpa:23.5,roas:2.0,ctr:2.5,cpc:1.5,cpm:35,frequency:2.0},
  keyTiles:["spend","purchases","cpa","roas","pv","aov","cpc","cpm","ctr","frequency"],
  cardMetrics:["spend","cpa","roas","pv","aov","frequency"],
  compareOn:true,
  defaultRange:"yesterday"
};
const RANGE_LABELS={today:"Today",yesterday:"Yesterday",last_7d:"Last 7 days",last_14d:"Last 14 days",last_30d:"Last 30 days",last_90d:"Last 90 days",this_month:"This month",last_month:"Last month",maximum:"Maximum"};

/* ============================ STATE ============================ */
const LS_KEY="adperf_settings_v2";
let S=loadSettings();
const State={
  range:"last_14d", campaign:"all", custom:{since:null,until:null},
  raw:{}, cur:null, prev:null, ads:[], groups:[], groupsPrev:{}, daily:[],
  curDates:null, prevDates:null,
  bkCache:{}, adAudience:null, adPlatform:null,
  compare:new Set(), charts:[], sparkCharts:[]
};
function loadSettings(){
  try{const v=JSON.parse(localStorage.getItem(LS_KEY));if(v&&v.targets)return Object.assign({},DEFAULTS,v,{targets:Object.assign({},DEFAULTS.targets,v.targets)});}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveSettings(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}}

/* ============================ DATA (snapshot) ============================ */
/* Live Meta data is pre-fetched by a scheduled Claude agent into data.json.
   The app just reads that snapshot — no connector bridge, no token, works on any phone. */
let SNAP=null;
async function loadSnapshot(){
  if(SNAP) return SNAP;
  const r=await fetch("data.json",{cache:"no-store"});
  if(!r.ok) throw new Error("Couldn't load data.json ("+r.status+"). The snapshot may not have been generated yet.");
  SNAP=await r.json();
  return SNAP;
}
/* Resolver — drop-in replacement for the old connector call. Given the SAME
   args the dashboard already builds, returns the matching pre-cached
   ad_entities array. Everything downstream (loadAll, applyScope, breakdowns,
   audience, every chart/tile/modal) is unchanged. */
function callTool(args){
  const bundle=SNAP&&SNAP.ranges&&SNAP.ranges[State.range];
  if(!bundle) return [];
  if(args.breakdowns) return (bundle.breakdowns&&bundle.breakdowns[args.breakdowns.join(",")])||[];
  if(args.time_increment) return (bundle.current&&bundle.current.campaignsDaily)||[];
  const section=args.time_range?bundle.previous:bundle.current;
  if(!section) return [];
  if(args.level==="account") return section.account||[];
  if(args.level==="campaign") return section.campaigns||[];
  if(args.level==="ad") return section.ads||[];
  return [];
}

/* ============================ PARSE / DERIVE ============================ */
function num(v){if(v==null)return 0;if(typeof v==="number")return v;const s=String(v);if(/not available/i.test(s))return 0;const n=parseFloat(s.replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;}
function rowSums(r){
  return {
    spend:num(r.amount_spent),impr:num(r.impressions),clicks:num(r.clicks),reach:num(r.reach),
    purch:num(r["actions:omni_purchase"]),linkClicks:num(r["actions:link_click"]),
    pv:num(r.amount_spent)*num(r.purchase_roas),
    p25:num(r.video_p25_watched_actions),p50:num(r.video_p50_watched_actions),
    p75:num(r.video_p75_watched_actions),p95:num(r.video_p95_watched_actions),
    p100:num(r.video_p100_watched_actions),thru:num(r.video_thruplay_watched_actions),n:1
  };
}
const SUM_KEYS=["spend","impr","clicks","reach","purch","linkClicks","pv","p25","p50","p75","p95","p100","thru","n"];
function addSums(a,b){const o={};for(const k of SUM_KEYS)o[k]=(a[k]||0)+(b[k]||0);return o;}
function emptySums(){const o={};for(const k of SUM_KEYS)o[k]=0;return o;}
function aggRows(rows){return rows.reduce((a,r)=>addSums(a,rowSums(r)),emptySums());}
function derive(s){
  return {
    spend:s.spend,impressions:s.impr,clicks:s.clicks,reach:s.reach,purchases:s.purch,linkClicks:s.linkClicks,pv:s.pv,n:s.n,
    cpa:s.purch?s.spend/s.purch:0, roas:s.spend?s.pv/s.spend:0, aov:s.purch?s.pv/s.purch:0,
    cpc:s.clicks?s.spend/s.clicks:0, cpm:s.impr?s.spend/s.impr*1000:0, ctr:s.impr?s.clicks/s.impr*100:0,
    frequency:s.reach?s.impr/s.reach:0, hookRate:s.impr?s.p25/s.impr*100:0, holdRate:s.p25?s.p100/s.p25*100:0,
    cvr:s.linkClicks?s.purch/s.linkClicks*100:0, _sums:s
  };
}

/* ============================ FORMAT ============================ */
function fmt(val,kind){
  if(val==null||isNaN(val))return "–";
  switch(kind){
    case "money":return "$"+val.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    case "money0":return "$"+Math.round(val).toLocaleString();
    case "int":return Math.round(val).toLocaleString();
    case "pct":return val.toFixed(2)+"%";
    case "x":return val.toFixed(2)+"x";
    case "num2":return val.toFixed(2);
    default:return String(val);
  }
}
function fmtMetric(m,key){let v=m[key];if((key==="spend"||key==="pv")&&v>=10000)return "$"+(v/1000).toFixed(2)+"K";return fmt(v,METRICS[key].fmt);}
function statusFor(key,value){
  const d=METRICS[key];if(!d||!d.tgt||value==null||value===0)return "";
  const t=S.targets[d.tgt];if(!t)return "";
  if(d.dir==="down")return value<=t?"g":value<=t*1.12?"a":"r";
  if(d.dir==="up")return value>=t?"g":value>=t*0.88?"a":"r";
  return "";
}
function onTarget(key,value){
  const d=METRICS[key];if(!d||!d.tgt)return null;const t=S.targets[d.tgt];if(!t||value==null)return null;
  return d.dir==="down"?value<=t:value>=t;
}
function statusColor(st){return st==="g"?"var(--green)":st==="a"?"var(--amber)":st==="r"?"var(--red)":"";}
function deltaInfo(key,cur,prev){
  if(prev==null||prev===0||cur==null)return null;
  const pct=(cur-prev)/Math.abs(prev)*100;const d=METRICS[key];let cls="flat";
  if(Math.abs(pct)>=0.05){const better=d.dir==="up"?pct>0:d.dir==="down"?pct<0:null;cls=better==null?"flat":better?"up":"down";}
  const arrow=pct>0.05?"▲":pct<-0.05?"▼":"–";
  return {pct,cls,arrow};
}
function parseFbDate(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d;}
function ymd(d){return d.toISOString().slice(0,10);}

/* ============================ LOAD ============================ */
function clearChartsAll(){State.charts.forEach(c=>{try{c.destroy()}catch(e){}});State.charts=[];(State.sparkCharts||[]).forEach(c=>{try{c.destroy()}catch(e){}});State.sparkCharts=[];}
function dateArgs(){
  if(State.range==="custom"&&State.custom.since&&State.custom.until)
    return {time_range:JSON.stringify({since:State.custom.since,until:State.custom.until})};
  return {date_preset:State.range};
}
function rangeKey(){return State.range==="custom"?("custom|"+State.custom.since+"|"+State.custom.until):State.range;}
async function loadAll(){
  clearChartsAll();

  const da=dateArgs();
  const [accountCur,campaigns,campDaily,ads]=await Promise.all([
    callTool(Object.assign({level:"account",fields:ACCT_FIELDS},da)),
    callTool(Object.assign({level:"campaign",fields:CAMP_FIELDS,sort:"amount_spent_descending",limit:60},da)),
    callTool(Object.assign({level:"campaign",fields:DAILY_FIELDS,time_increment:"1",limit:400},da)),
    callTool(Object.assign({level:"ad",fields:AD_FIELDS,sort:"amount_spent_descending",limit:300},da))
  ]);
  State.raw={accountCur,campaigns:campaigns.filter(c=>num(c.amount_spent)>0),campDaily,ads,accountPrev:null,campaignsPrev:null,adsPrev:null};
  const a0=accountCur[0]||ads[0];

    const pUntil=new Date(cd.since);pUntil.setDate(pUntil.getDate()-1);
    const pSince=new Date(pUntil);pSince.setDate(pSince.getDate()-(len-1));
    State.prevDates={since:pSince,until:pUntil};
    const tr=JSON.stringify({since:ymd(pSince),until:ymd(pUntil)});
    try{
      const [accountPrev,campaignsPrev,adsPrev]=await Promise.all([
        callTool({level:"account",fields:ACCT_FIELDS,time_range:tr}),
        callTool({level:"campaign",fields:CAMP_FIELDS,time_range:tr,limit:60}),
        callTool({level:"ad",fields:AD_FIELDS_LITE,time_range:tr,sort:"amount_spent_descending",limit:300})
      ]);

function populateCampaigns(){
  const sel=document.getElementById("campSel");
  const prev=State.campaign;
  sel.innerHTML='<option value="all">All campaigns</option>';
  (State.raw.campaigns||[]).forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.name;sel.appendChild(o);});
  if(prev!=="all"&&!(State.raw.campaigns||[]).some(c=>c.id===prev))State.campaign="all";
  sel.value=State.campaign;
}
function applyScope(){
  const raw=State.raw,camp=State.campaign;
  State.cur = camp==="all" ? derive(aggRows(raw.accountCur||[])) : derive(rowSums((raw.campaigns||[]).find(c=>c.id===camp)||{}));
  if(S.compareOn&&raw.accountPrev){
    State.prev = camp==="all" ? derive(aggRows(raw.accountPrev)) : (()=>{const r=(raw.campaignsPrev||[]).find(c=>c.id===camp);return r?derive(rowSums(r)):null;})();
  } else State.prev=null;
  let ads=(raw.ads||[]).map(r=>({id:r.id,name:r.name,campaign_id:r.campaign_id,creative_id:r.creative_id,sums:rowSums(r),m:derive(rowSums(r))}));
  if(camp!=="all") ads=ads.filter(a=>a.campaign_id===camp);
  ads=ads.filter(a=>a.sums.spend>0||a.sums.impr>0).sort((a,b)=>b.sums.spend-a.sums.spend);
  State.ads=ads; State.groups=buildGroups(ads);
  State.groupsPrev={};
  if(S.compareOn&&raw.adsPrev){
    let ap=raw.adsPrev.map(r=>({id:r.id,name:r.name,campaign_id:r.campaign_id,sums:rowSums(r),m:derive(rowSums(r))}));
    if(camp!=="all") ap=ap.filter(a=>a.campaign_id===camp);
    buildGroups(ap).forEach(g=>State.groupsPrev[g.name]=g);
  }
  const dmap={};
  (raw.campDaily||[]).forEach(r=>{
    if(!r.date_start)return; if(camp!=="all"&&r.id!==camp)return;
    const s=rowSums(r); if(s.spend<=0&&s.impr<=0)return;
    if(!dmap[r.date_start])dmap[r.date_start]=emptySums();
    dmap[r.date_start]=addSums(dmap[r.date_start],s);
  });
  State.daily=Object.entries(dmap).map(([date,s])=>({date,m:derive(s)})).sort((a,b)=>parseFbDate(a.date)-parseFbDate(b.date));
}
function buildGroups(ads){
  const map={};
  ads.forEach(a=>{
    if(!map[a.name])map[a.name]={name:a.name,sums:emptySums(),ids:[],items:[],creativeIds:[]};
    const g=map[a.name];g.sums=addSums(g.sums,a.sums);g.ids.push(a.id);g.items.push(a);if(a.creative_id)g.creativeIds.push(a.creative_id);

  return Object.values(map).map(g=>{g.m=derive(g.sums);return g;}).sort((x,y)=>y.m.spend-x.m.spend);
}

let tilesEditMode=false,dragKey=null;

function fillTiles(tilesEl){

      <div class="lab">${st?`<span class="dot-status" style="background:${statusColor(st)}"></span>`:""}${METRICS[key].label}${tilesEditMode?'<span class="drag-h" title="Drag to reorder">⠿</span>':''}</div>

      t.addEventListener("touchmove",e=>{
        const tt=e.touches[0];if(!tt)return;e.preventDefault();

    add.querySelector("select").onchange=e=>{if(e.target.value)addTile(e.target.value);};
    tilesEl.appendChild(add);
  }
}

const TREND_METRICS=["spend","roas","cpa","purchases","cpm","ctr","cpc"];
function renderTrend(){

    <div class="legend" id="trendLegend" style="margin-top:8px"></div></div></div>`);

  TREND_METRICS.forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=METRICS[k].label;sel.appendChild(o);});
  sel.value="cpa";
  sel.onchange=()=>drawTrend();
  return sec;
}
function drawTrend(){
  const cv=document.getElementById("trendChart");if(!cv)return;
  const key=document.getElementById("trendMetric").value;
  const labels=State.daily.map(d=>{const dt=parseFbDate(d.date);return dt?dt.toLocaleDateString(undefined,{month:"short",day:"numeric"}):d.date;});
  const data=State.daily.map(d=>d.m[key]||0);
  const tgtKey=METRICS[key].tgt;const tgtVal=tgtKey?S.targets[tgtKey]:null;
  if(cv._chart)cv._chart.destroy();
  const isBar=key==="spend"||key==="purchases";
  const ptColors=data.map(v=>{const ok=onTarget(key,v);return ok==null?"#f0682a":ok?"#1a9d63":"#d6452f";});
  const main={type:isBar?"bar":"line",label:METRICS[key].label,data,
      borderColor:tgtVal!=null?"#33405a":"#f0682a",
      backgroundColor:isBar?ptColors:"rgba(240,104,42,.08)",
      borderWidth:2,tension:.3,fill:!isBar&&tgtVal==null,
      pointRadius:isBar?0:3,pointBackgroundColor:ptColors,pointBorderColor:ptColors,order:2};
  const datasets=[main];
  if(tgtVal!=null)datasets.push({type:"line",label:"Target ("+fmt(tgtVal,METRICS[key].fmt)+")",data:labels.map(()=>tgtVal),borderColor:"#1a9d63",borderDash:[6,4],borderWidth:1.6,pointRadius:0,fill:false,order:1});
  cv._chart=new Chart(cv,{data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+fmt(c.parsed.y,METRICS[key].fmt)}}},
      scales:{y:{beginAtZero:isBar,grid:{color:"#eef0f4"},ticks:{font:{size:10},callback:v=>fmt(v,METRICS[key].fmt)}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  State.charts.push(cv._chart);
  const lg=document.getElementById("trendLegend");
  if(lg)lg.innerHTML = tgtVal!=null
    ? `<span><span class="sw" style="background:var(--green)"></span>day on target</span><span><span class="sw" style="background:var(--red)"></span>day off target</span><span><span class="sw" style="background:var(--green);height:2px;width:14px;border-radius:0"></span>target ${fmt(tgtVal,METRICS[key].fmt)}</span>`
    : `<span class="muted">No target set for ${METRICS[key].label} — set one in Settings to see a target line.</span>`;
}

async function drawBreakdownChart(){
  const cv=document.getElementById("bkChart"),tw=document.getElementById("bkTableWrap");
  if(!cv)return;tw.innerHTML=`<div class="muted" style="padding:10px">Loading…</div>`;
  let rows;
  try{rows=await loadBreakdownRaw(bkState.dim);}catch(e){tw.innerHTML=`<div class="muted" style="padding:10px">Couldn't load this breakdown.</div>`;return;}
  const def=BK_DIMS[bkState.dim],map={};
  rows.forEach(r=>{
    if(State.campaign!=="all"&&r.campaign_id!==State.campaign)return;
    const s=rowSums(r);if(s.spend<=0&&s.impr<=0)return;
    const label=def.bk.map(k=>r[k]).filter(Boolean).join(" · ")||"Unknown";

  });
  const key=bkState.metric;
  let buckets=Object.entries(map).map(([label,s])=>({label,m:derive(s)})).sort((a,b)=>(b.m[key]||0)-(a.m[key]||0)).slice(0,12);
  if(!cv){return;}
  if(cv._chart)cv._chart.destroy();
  cv._chart=new Chart(cv,{type:"bar",data:{labels:buckets.map(b=>b.label),datasets:[{label:METRICS[key].label,data:buckets.map(b=>b.m[key]||0),backgroundColor:"rgba(124,108,240,.65)",borderRadius:5}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>METRICS[key].label+": "+fmt(c.parsed.x,METRICS[key].fmt)}}},

  State.charts.push(cv._chart);
  let html=`<table class="bk-table"><thead><tr><th>${def.label}</th><th>Spend</th><th>ROAS</th><th>CPA</th><th>Purch</th></tr></thead><tbody>`;
  buckets.forEach(b=>{const m=b.m;html+=`<tr><td>${b.label}</td><td>${fmt(m.spend,"money0")}</td><td>${m.roas?m.roas.toFixed(2):"–"}</td><td>${m.cpa?fmt(m.cpa,"money"):"–"}</td><td>${fmt(m.purchases,"int")}</td></tr>`;});

}

/* ============================ DETAIL MODAL ============================ */
let detailState={name:null,tab:"perf"};
function openDetail(name,tab){const g=State.groups.find(x=>x.name===name);if(!g)return;detailState={name,tab:tab||"perf"};drawModal();document.getElementById("overlay").classList.add("show");}
function closeModal(){document.getElementById("overlay").classList.remove("show");}
function retentionPoints(s){
  const impr=s.impr||0;if(!impr)return [0,0,0,0,0,0];
  let raw=[100,s.p25/impr*100,s.p50/impr*100,s.p75/impr*100,s.p95/impr*100,s.p100/impr*100];
  for(let i=1;i<raw.length;i++){if(raw[i]>raw[i-1])raw[i]=raw[i-1];if(raw[i]<0)raw[i]=0;}
  return raw;
}
const RET_LABELS=["Impression","25%","50%","75%","95%","100%"];
function drawModal(){
  const g=State.groups.find(x=>x.name===detailState.name);if(!g)return;
  const m=g.m,prev=State.groupsPrev[g.name];
  const modal=document.getElementById("modal");
  modal.innerHTML=`
    <div class="modal-head"><h3>${g.name}</h3><span class="pill n">${g.ids.length} ad${g.ids.length>1?"s":""} grouped</span>
      <span class="pill ${statusFor("cpa",m.cpa)||"n"}">CPA ${fmt(m.cpa,"money")}</span>
      <span class="pill ${statusFor("roas",m.roas)||"n"}">ROAS ${m.roas.toFixed(2)}x</span>
      <button class="x" id="mClose">×</button></div>
    <div class="tabs"><button data-t="perf">Performance</button><button data-t="video">Video &amp; Creative</button><button data-t="aud">Audience</button></div>
    <div class="modal-body" id="mBody"></div>`;
  modal.querySelector("#mClose").onclick=closeModal;
  modal.querySelectorAll(".tabs button").forEach(b=>{if(b.dataset.t===detailState.tab)b.classList.add("active");b.onclick=()=>{detailState.tab=b.dataset.t;drawModal();};});
  const body=modal.querySelector("#mBody");

  else if(detailState.tab==="video")renderVideoTab(body,g);

}

async function renderAudTab(body,g){
  body.innerHTML=`<div class="muted" style="padding:8px">Loading audience breakdown…</div>`;

  arr=arr.filter(b=>b.m.spend>0).sort((a,b)=>b.m.spend-a.m.spend);
  const ch=new Chart(cv,{type:"bar",data:{labels:arr.map(a=>a.label),datasets:[{data:arr.map(a=>a.m.spend),backgroundColor:color,borderRadius:4}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const m=arr[c.dataIndex].m;return "Spend "+fmt(m.spend,"money0")+" · ROAS "+(m.roas?m.roas.toFixed(2):"–")+" · CPA "+(m.cpa?fmt(m.cpa,"money"):"–");}}}},scales:{x:{grid:{color:"#eef0f4"},ticks:{font:{size:10},callback:v=>"$"+v}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});
  State.charts.push(ch);
}

/* ============================ COMPARE ============================ */
function updateCmpBar(){
  const names=[...State.compare];
  document.getElementById("cmpNames").textContent=names.join(", ");
  document.getElementById("cmpbar").classList.toggle("show",names.length>0);
}
function openCompare(){
  const names=[...State.compare];if(!names.length)return;
  const groups=names.map(n=>State.groups.find(g=>g.name===n)).filter(Boolean);
  const modal=document.getElementById("modal");
  modal.innerHTML=`<div class="modal-head"><h3>Creative comparison</h3><span class="pill n">${groups.length} creatives</span>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center"><select id="cmpMetric"></select><button class="x" id="mClose">×</button></div></div>
    <div class="modal-body"><div class="card chart-box" style="box-shadow:none"><div class="chartwrap" style="height:300px"><canvas id="cmpChart"></canvas></div></div>
      <div class="grouphdr">Video retention overlay (% of impressions)</div>
      <div class="card chart-box" style="box-shadow:none"><div class="chartwrap" style="height:240px"><canvas id="cmpRet"></canvas></div></div>
      <div id="cmpTable"></div></div>`;
  modal.querySelector("#mClose").onclick=closeModal;
  const sel=modal.querySelector("#cmpMetric");
  ["cpa","roas","spend","pv","aov","ctr","cpc","cpm","frequency","hookRate","holdRate","purchases"].forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=METRICS[k].label;sel.appendChild(o);});
  sel.value="cpa";sel.onchange=()=>drawCmp(groups,sel.value);
  document.getElementById("overlay").classList.add("show");
  requestAnimationFrame(()=>{drawCmp(groups,"cpa");drawCmpRet(groups);});
}
const CMP_COLORS=["#7c6cf0","#f0682a","#1a9d63","#3563d6","#d6452f","#c9870a","#0e9aa7","#b5179e"];
function drawCmp(groups,key){
  const cv=document.getElementById("cmpChart");if(!cv)return;if(cv._chart)cv._chart.destroy();
  cv._chart=new Chart(cv,{type:"bar",data:{labels:groups.map(g=>g.name),datasets:[{label:METRICS[key].label,data:groups.map(g=>g.m[key]||0),backgroundColor:groups.map((_,i)=>CMP_COLORS[i%CMP_COLORS.length])}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>METRICS[key].label+": "+fmt(c.parsed.y,METRICS[key].fmt)}}},scales:{y:{beginAtZero:true,grid:{color:"#eef0f4"},ticks:{font:{size:10},callback:v=>fmt(v,METRICS[key].fmt)}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  State.charts.push(cv._chart);
  const keys=["spend","cpa","roas","pv","aov","ctr","frequency"];
  let html=`<table class="bk-table"><thead><tr><th>Creative</th>${keys.map(k=>`<th>${METRICS[k].label}</th>`).join("")}</tr></thead><tbody>`;
  groups.forEach(g=>{html+=`<tr><td>${g.name}</td>${keys.map(k=>`<td>${fmtMetric(g.m,k)}</td>`).join("")}</tr>`;});
  html+=`</tbody></table>`;document.getElementById("cmpTable").innerHTML=html;
}
function drawCmpRet(groups){
  const cv=document.getElementById("cmpRet");if(!cv)return;
  const ds=groups.map((g,i)=>({label:g.name,data:retentionPoints(g.sums),borderColor:CMP_COLORS[i%CMP_COLORS.length],borderWidth:2,pointRadius:0,tension:.25,fill:false}));
  const ch=new Chart(cv,{type:"line",data:{labels:RET_LABELS,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+c.parsed.y.toFixed(1)+"%"}}},scales:{y:{min:0,max:100,grid:{color:"#eef0f4"},ticks:{font:{size:10},callback:v=>v+"%"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  State.charts.push(ch);
}

/* ============================ SETTINGS ============================ */
function openSettings(){
  const modal=document.getElementById("modal");
  const tRows=[["cpa","Target CPA ($, lower is better)"],["roas","Target ROAS (x, higher is better)"],["ctr","Target CTR (%, higher)"],["cpc","Target CPC ($, lower)"],["cpm","Target CPM ($, lower)"],["frequency","Max Frequency (lower)"]];
  modal.innerHTML=`<div class="modal-head"><h3>Settings</h3><button class="x" id="mClose">×</button></div>
    <div class="modal-body">
      <div class="grouphdr">Default date range on open</div>
      <div class="settings-row"><label>When the dashboard opens, start on this range</label>
        <select id="defRangeSel" class="dateinput" style="width:auto">${Object.keys(RANGE_LABELS).map(r=>`<option value="${r}" ${S.defaultRange===r?"selected":""}>${RANGE_LABELS[r]}</option>`).join("")}</select></div>
      <div class="grouphdr">Targets — drive the green / amber / red coloring &amp; daily-trend target line</div>
      ${tRows.map(([k,l])=>`<div class="settings-row"><label>${l}</label><input type="number" step="0.01" data-tgt="${k}" value="${S.targets[k]}"></div>`).join("")}
      <div class="grouphdr">Metrics shown on ad cards</div>
      <div class="checks" id="cardChecks">${Object.keys(METRICS).map(k=>`<label><input type="checkbox" data-card="${k}" ${S.cardMetrics.includes(k)?"checked":""}> ${METRICS[k].label}</label>`).join("")}</div>
      <div class="grouphdr">Key-metric tiles</div>
      <div class="checks" id="tileChecks">${Object.keys(METRICS).map(k=>`<label><input type="checkbox" data-tile="${k}" ${S.keyTiles.includes(k)?"checked":""}> ${METRICS[k].label}</label>`).join("")}</div>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn primary" id="saveSettings">Save &amp; apply</button><button class="btn" id="resetSettings">Reset defaults</button></div>
    </div>`;
  modal.querySelector("#mClose").onclick=closeModal;
  modal.querySelector("#saveSettings").onclick=()=>{
    modal.querySelectorAll("[data-tgt]").forEach(i=>{const v=parseFloat(i.value);if(!isNaN(v))S.targets[i.dataset.tgt]=v;});
    const dr=modal.querySelector("#defRangeSel");if(dr)S.defaultRange=dr.value;
    S.cardMetrics=[...modal.querySelectorAll("[data-card]:checked")].map(i=>i.dataset.card);
    const checkedTiles=[...modal.querySelectorAll("[data-tile]:checked")].map(i=>i.dataset.tile);
    const ordered=S.keyTiles.filter(k=>checkedTiles.includes(k));
    checkedTiles.forEach(k=>{if(!ordered.includes(k))ordered.push(k);});
    if(!S.cardMetrics.length)S.cardMetrics=DEFAULTS.cardMetrics.slice();
    S.keyTiles=ordered.length?ordered:DEFAULTS.keyTiles.slice();
    saveSettings();closeModal();render();
  };
  modal.querySelector("#resetSettings").onclick=()=>{S=JSON.parse(JSON.stringify(DEFAULTS));saveSettings();closeModal();render();};
  document.getElementById("overlay").classList.add("show");
}

/* ============================ INIT ============================ */
function showError(msg){document.getElementById("app").innerHTML=`<div class="err"><strong>Couldn't load data.</strong> ${msg}<br><span class="muted">Use the Reload button in the view header to retry.</span></div>`;}
async function boot(){
  try{
    document.getElementById("app").innerHTML=`<div class="loading"><div class="spinner"></div>Loading your latest ad data…</div>`;
    await loadSnapshot();
    updateFreshness();
    await loadAll();render();
  }catch(e){showError(e.message||String(e));}
}
/* "Updated Xm ago" badge, from the snapshot's generated_at timestamp */
function updateFreshness(){
  const b=document.getElementById("updBadge");if(!b)return;
  const ts=SNAP&&SNAP.metadata&&SNAP.metadata.generated_at;
  const t=ts?new Date(ts):null;
  if(!t||isNaN(t)){b.textContent="—";b.classList.add("old");return;}
  const mins=Math.max(0,Math.round((Date.now()-t.getTime())/60000));
  b.textContent = mins<1?"Updated just now" : mins<60?("Updated "+mins+"m ago") : mins<1440?("Updated "+Math.round(mins/60)+"h ago") : ("Updated "+Math.round(mins/1440)+"d ago");
  b.classList.toggle("stale",mins>=360&&mins<1440);
  b.classList.toggle("old",mins>=1440);
  b.title="Data last refreshed "+t.toLocaleString();
}
document.getElementById("acctName").textContent=ACCT_NAME;
document.getElementById("campSel").onchange=e=>{State.campaign=e.target.value;State.compare.clear();updateCmpBar();applyScope();render();};
document.getElementById("rangeSel").onchange=e=>{
  State.range=e.target.value; S.defaultRange=State.range; saveSettings(); boot();
};
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("cmpToggle").textContent="Δ vs prev: "+(S.compareOn?"on":"off");
document.getElementById("cmpToggle").onclick=e=>{S.compareOn=!S.compareOn;saveSettings();e.target.textContent="Δ vs prev: "+(S.compareOn?"on":"off");boot();};
document.getElementById("cmpOpen").onclick=openCompare;
document.getElementById("cmpClear").onclick=()=>{State.compare.clear();updateCmpBar();document.querySelectorAll(".cmp-check input").forEach(c=>c.checked=false);};
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
State.range=(S.defaultRange&&S.defaultRange!=="custom"&&RANGE_LABELS[S.defaultRange])?S.defaultRange:"last_14d";
document.getElementById("rangeSel").value=State.range;
/* Service worker — offline app shell + installable PWA */
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
/* Keep the "Updated Xm ago" badge current */
setInterval(updateFreshness,60000);
boot();
/* Re-pull fresh data whenever the app is reopened or refocused.
   The installed PWA otherwise keeps the snapshot it fetched on first load
   and shows stale numbers while the backend keeps refreshing every 4h. */
let _lastRefetch=Date.now();
function refetchIfStale(){
  if(Date.now()-_lastRefetch<30000) return;   // debounce rapid focus events
  _lastRefetch=Date.now();
  SNAP=null;          // force loadSnapshot() to hit the network again
  boot();             // re-fetches data.json (SW is network-first) + re-renders
}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")refetchIfStale();});
window.addEventListener("focus",refetchIfStale);
</script>
